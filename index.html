</style>
</head>
<body>
<div id="app"><div class="content" id="root"></div></div>

<script>
const SYS = `You are the historical matching engine for AMERICA 250: WHO WOULD YOU HAVE BEEN? — a 250th anniversary experience. Analyze the person's photo and any online presence to match them to a historical figure from the American Revolutionary era (1760s–1800s).

CRITICAL: Resist defaulting to Washington, Jefferson, or Hamilton. The full figure pool includes:

PATRIOTS: George Washington, Thomas Jefferson, Alexander Hamilton, James Madison, Benjamin Franklin, John Adams, Patrick Henry, Paul Revere, Thomas Paine, Nathanael Greene, Francis Marion (Swamp Fox)
PATRIOT WOMEN: Abigail Adams, Mercy Otis Warren, Deborah Sampson (fought disguised as a man), Molly Pitcher, Betsy Ross, Phillis Wheatley (poet and intellectual)
OVERLOOKED HEROES: Crispus Attucks (first martyr, of African and Wampanoag descent), James Armistead Lafayette (enslaved man who became a double agent for Washington), Haym Salomon (Jewish financier who personally funded the Revolution), Peter Salem (Black soldier at Bunker Hill)
HAUDENOSAUNEE / IROQUOIS CONFEDERACY: Canassatego (Onondaga chief — his 1744 Treaty of Lancaster speech urging colonial union was printed by Benjamin Franklin and directly inspired the Albany Plan of 1754, a forerunner of the Constitution; he is the most important non-European influence on American democracy), Hendrick Theyanoguin / King Hendrick (Mohawk sachem present at the 1754 Albany Congress where Franklin proposed colonial union modeled on the Haudenosaunee Confederacy), Red Jacket / Sagoyewatha (Seneca orator), Cornplanter (Seneca diplomat), Joseph Brant / Thayendanegea (Mohawk war chief and British ally), Dragging Canoe (Cherokee warrior who refused to cede land)
LOYALISTS / TORIES: William Franklin (royal governor of New Jersey and Benjamin Franklin's estranged son — the most poignant Loyalist story of the era), Jonathan Sewall (lawyer who chose exile over revolution), Joseph Galloway (Continental Congress delegate who became a Loyalist)
BRITISH: Lord Cornwallis, General John Burgoyne ("Gentleman Johnny"), Banastre Tarleton ("Bloody Ban"), Major John André (executed spy)
ALLIES: Marquis de Lafayette, Tadeusz Kościuszko, Baron von Steuben

Match based on: facial features and expression energy from the photo; writing style, stated values, and expressed beliefs from any online presence. The soul match matters most. Anti-establishment fire → Thomas Paine. Quiet craft and symbol-making → Betsy Ross. Navigating two cultures with fierce loyalty to kin → Canassatego or Joseph Brant. Someone who funded others but took no glory → Haym Salomon.

Return ONLY valid compact JSON with no markdown, no preamble, no explanation:
{"figureName":"Full name","figureAlias":"Alias or null","figureTitle":"Role e.g. Onondaga Chief and Constitutional Influence","figureSide":"Patriot|Loyalist|British|Haudenosaunee|French Ally|Overlooked Hero","figureYears":"e.g. 1700–1750","matchPercentage":87,"physicalMatch":"2 sentences about facial and physical resonance","soulMatch":"2 sentences about personality and values alignment","historyLesson":"3 sentences including at least one thing most people do not know","surpriseFactor":"One memorable sentence about why this match may surprise the person","portraitPrompt":"Detailed visual description for portrait generation including clothing setting lighting and expression","shareQuote":"Authentic or highly plausible quote from this figure max 18 words"}`;

let S = {
  step: 'landing',
  photo: null,
  urls: ['', '', ''],
  result: null,
  portrait: null,
  pLoaded: false,
  msg: 'Consulting the historical record…',
  err: null,
  copied: false
};

const MSGS = [
  'Consulting the historical record…',
  'Reading your countenance by candlelight…',
  'Weighing your values against the era…',
  'Searching pamphlets and broadsides…',
  'The quill moves across parchment…',
  'Summoning spirits of 1776…',
  'Cross-referencing the Haudenosaunee Confederacy…',
  'Consulting the Albany Congress of 1754…'
];

let msgTimer = null;

function set(u) { S = { ...S, ...u }; draw(); }

function sideClass(s) {
  if (!s) return '';
  const l = s.toLowerCase();
  if (l.includes('loyalist') || l.includes('tory')) return 'sc-loyalist';
  if (l.includes('british')) return 'sc-british';
  if (l.includes('haudenosaunee') || l.includes('iroquois') || l.includes('nation')) return 'sc-haudenosaunee';
  if (l.includes('ally')) return 'sc-ally';
  if (l.includes('overlooked') || l.includes('hero')) return 'sc-hero';
  return 'sc-patriot';
}

async function resizePhoto(file) {
  return new Promise(res => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      let { width: w, height: h } = img;
      const max = 900;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h / w * max); w = max; }
        else { w = Math.round(w / h * max); h = max; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      const d = c.toDataURL('image/jpeg', 0.82);
      res({ data: d.split(',')[1], type: 'image/jpeg', preview: d, name: file.name });
    };
    img.src = url;
  });
}

async function analyze() {
  set({ step: 'analyzing', err: null });
  msgTimer = setInterval(() => set({ msg: MSGS[Math.floor(Math.random() * MSGS.length)] }), 2600);

  try {
    const hasUrls = S.urls.some(u => u.trim());
    const uc = [];

    if (S.photo) {
      uc.push({ type: 'image', source: { type: 'base64', media_type: S.photo.type, data: S.photo.data } });
    }

    let p = 'Analyze this person and identify their Revolutionary Era historical counterpart.';
    if (hasUrls) {
      p += '\n\nSearch and read their online presence for deeper soul analysis:\n'
        + S.urls.filter(u => u.trim()).map((u, i) => `${i + 1}. ${u}`).join('\n')
        + '\n\nTheir expressed values, writing style, and stated beliefs should heavily influence the match.';
    }
    p += '\n\nReturn only the JSON object.';
    uc.push({ type: 'text', text: p });

    // web_search_20250305 is server-side — single call, no looping needed
    const body = { model: 'claude-sonnet-4-6', max_tokens: 1500, system: SYS, messages: [{ role: 'user', content: uc }] };
    if (hasUrls) body.tools = [{ type: 'web_search_20250305', name: 'web_search' }];

    const r = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const final = await r.json();

    // Catch API-level errors explicitly
    if (final.type === 'error' || final.error) {
      const msg = final.error?.message || JSON.stringify(final.error) || 'Unknown API error';
      throw new Error('API error: ' + msg);
    }
    if (!r.ok) throw new Error('HTTP ' + r.status + ': ' + JSON.stringify(final).slice(0, 200));
    if (!final.content) throw new Error('Empty response. Keys: ' + Object.keys(final).join(', '));

    // Collect all text blocks (web search responses may have multiple)
    const txt = (final.content || []).filter(b => b.type === 'text').map(b => b.text).join('');

    if (!txt) {
      const blockTypes = (final.content || []).map(b => b.type).join(', ');
      throw new Error(`No text in response. Block types: ${blockTypes}. stop_reason: ${final.stop_reason}`);
    }

    // Strip markdown code fences if present (```json ... ``` or ``` ... ```)
    const stripped = txt.replace(/```(?:json)?\s*/gi, '').replace(/```/g, '').trim();

    const s = stripped.indexOf('{'), e = stripped.lastIndexOf('}');
    if (s === -1) throw new Error(`No JSON found. Raw response (first 400 chars): ${txt.slice(0, 400)}`);

    let result;
    try {
      result = JSON.parse(stripped.slice(s, e + 1));
    } catch (parseErr) {
      throw new Error(`JSON parse failed: ${parseErr.message}. Raw (first 400): ${stripped.slice(s, Math.min(s + 400, e + 1))}`);
    }

    const pp = `18th century oil painting portrait, ${result.figureName}${result.figureAlias ? ' also known as ' + result.figureAlias : ''}, ${result.portraitPrompt || result.figureTitle + ', American Revolutionary era'}, dramatic candlelight, aged canvas texture, masterwork historical portrait`;
    const portrait = `https://image.pollinations.ai/prompt/${encodeURIComponent(pp)}?width=640&height=440&seed=250&nologo=true`;

    clearInterval(msgTimer);
    set({ result, portrait, pLoaded: false, step: 'result', err: null });
  } catch (err) {
    clearInterval(msgTimer);
    set({ err: err.message, step: 'input' });
  }
}

function copyShare() {
  if (!S.result) return;
  const r = S.result;
  const t = `🦅 AMERICA 250: WHO WOULD YOU HAVE BEEN?\n\nMy Revolutionary Era match: ${r.figureName}${r.figureAlias ? ' ("' + r.figureAlias + '")' : ''}\n${r.figureTitle} · ${r.figureSide} · ${r.matchPercentage}% Match\n\n"${r.shareQuote}"\n\nDiscover yours → america250match.com\n#America250 #WhoWouldYouHaveBeen #1776`;
  navigator.clipboard.writeText(t).then(() => {
    set({ copied: true });
    setTimeout(() => set({ copied: false }), 2800);
  });
}

function updateUrl(i, v) { const u = [...S.urls]; u[i] = v; S.urls = u; }

function draw() {
  const el = document.getElementById('root');
  if (!el) return;

  if (S.step === 'landing') {
    el.innerHTML = `<div class="landing">
<span class="eagle">🦅</span>
<div class="eyebrow">1776 · America's 250th Anniversary · 2026</div>
<div class="series-title">America 250</div>
<h1 class="main-h">Who Would You<br>Have Been?</h1>
<div class="ornament">⁂ · ⁂ · ⁂</div>
<p class="landing-p">Your face carries the echo of a forgotten soul. Upload your portrait — and optionally share your online voice — to discover which figure of the Revolutionary era you truly are. It may not be who you expect.</p>
<button class="cta" onclick="set({step:'input'})">Begin Your Discovery</button>
<p class="roster">Patriots · Loyalists & Tories · Haudenosaunee Confederacy<br>British Officers · Poets · Spies · Overlooked Heroes</p>
</div>`;

  } else if (S.step === 'input') {
    const ph = S.photo;
    el.innerHTML = `<div class="step-wrap">
<div class="step-ey">America 250 · Historical Profile</div>
<h2 class="step-h">Present Your Countenance</h2>
<p class="step-hint">Your portrait is required. Online links deepen the soul match.</p>
${S.err ? `<div class="err">${S.err}</div>` : ''}
<div class="grid2">
  <div>
    <div class="panel">
      <div class="plbl">Your Portrait <span class="req">✦</span></div>
      ${ph
        ? `<img src="${ph.preview}" alt="your photo" class="prev-img"><p class="prev-name">${ph.name}</p><button class="chg-btn" onclick="document.getElementById('pIn').click()">Change Photo</button>`
        : `<div class="drop-zone" id="dz"><div class="drop-ic">◈</div><div class="drop-t">Upload Your Portrait</div><div class="drop-h">Click or drag your photo here</div></div>`
      }
      <input type="file" id="pIn" accept="image/*" style="display:none">
    </div>
  </div>
  <div>
    <div class="panel">
      <div class="plbl">Your Online Voice <span style="color:#4a3015;font-weight:400;font-size:9px">(Optional)</span></div>
      <p class="url-cap">Share up to 3 public URLs — Facebook, blog, personal website. The AI reads your actual words to find your era's counterpart.</p>
      ${[0, 1, 2].map(i => `
        <label class="flbl">Link ${i + 1}</label>
        <input class="url-in" type="url" placeholder="${['https://facebook.com/yourprofile', 'https://yourblog.com', 'https://yourwebsite.com'][i]}" value="${S.urls[i]}" onchange="updateUrl(${i}, this.value)">`).join('')}
    </div>
  </div>
</div>
<button class="go-btn" ${!ph ? 'disabled' : ''} onclick="analyze()">✦ &nbsp; Consult the Historical Archive &nbsp; ✦</button>
</div>`;

    const pi = document.getElementById('pIn');
    if (pi) pi.onchange = async e => { if (e.target.files[0]) { const p = await resizePhoto(e.target.files[0]); set({ photo: p }); } };
    const dz = document.getElementById('dz');
    if (dz) {
      dz.onclick = () => document.getElementById('pIn').click();
      dz.ondragover = e => { e.preventDefault(); dz.classList.add('over'); };
      dz.ondragleave = () => dz.classList.remove('over');
      dz.ondrop = async e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) { const p = await resizePhoto(e.dataTransfer.files[0]); set({ photo: p }); } };
    }

  } else if (S.step === 'analyzing') {
    el.innerHTML = `<div class="analyzing">
<span class="quill">🪶</span>
<h2 class="an-h">Consulting the Archive</h2>
<p class="an-s">${S.msg}</p>
<div class="pbar"><div class="pfill"></div></div>
</div>`;

  } else if (S.step === 'result' && S.result) {
    const r = S.result;
    const sc = sideClass(r.figureSide);
    el.innerHTML = `<div class="result-wrap">
<button class="back-btn" onclick="set({step:'input',result:null,portrait:null})">← Begin Again</button>
<div class="card-outer">
  <div class="card-hdr">
    <div class="card-series">America 250 · Revolutionary Era · Historical Match</div>
    <div class="card-name">${r.figureName}</div>
    ${r.figureAlias ? `<div class="card-alias">"${r.figureAlias}"</div>` : ''}
  </div>
  <div class="card-img-wrap" id="imgWrap">
    ${S.portrait
      ? `<img src="${S.portrait}" alt="${r.figureName}" id="portImg" ${S.pLoaded ? '' : 'style="display:none"'}><span class="port-ph" ${S.pLoaded ? 'style="display:none"' : ''}>Rendering period portrait…</span>`
      : '<span class="port-ph">Generating portrait…</span>'}
  </div>
  <div class="card-stats">
    <div class="stat">
      <span class="stat-l">Side</span>
      <span class="stat-v ${sc}">${(r.figureSide || 'Patriot').split(' ')[0]}</span>
    </div>
    <div class="stat">
      <span class="stat-l">Years</span>
      <span class="stat-v sm">${r.figureYears || 'c. 1700s'}</span>
    </div>
    <div class="stat">
      <span class="stat-l">Match</span>
      <span class="stat-v">${r.matchPercentage}%</span>
      <div class="mbar"><div class="mfill" style="width:${r.matchPercentage}%"></div></div>
    </div>
    <div class="stat">
      <span class="stat-l">Era</span>
      <span class="stat-v sm">Rev. War</span>
    </div>
  </div>
  <div class="card-body">
    <div class="card-role">${r.figureTitle}</div>
    <div class="sec"><div class="sec-l">Physical Echo</div><p class="sec-t">${r.physicalMatch}</p></div>
    <div class="sec"><div class="sec-l">Soul Match</div><p class="sec-t">${r.soulMatch}</p></div>
  </div>
  <div class="card-hist">
    <div class="sec-l" style="margin-bottom:8px">The History Lesson</div>
    <p class="sec-t">${r.historyLesson}</p>
  </div>
  ${r.shareQuote ? `<div class="card-quote"><p class="q-text">"${r.shareQuote}"</p><p class="q-attr">— ${r.figureName}</p></div>` : ''}
  <div class="card-foot">
    <span class="foot-t">America 250 · 1776–2026</span>
    <span class="foot-t">#WhoWouldYouHaveBeen</span>
  </div>
</div>
${r.surpriseFactor ? `<div class="surprise"><div class="surp-l">⚡ Why This May Surprise You</div><p class="surp-t">${r.surpriseFactor}</p></div>` : ''}
<div class="actions">
  <button class="act act-p" onclick="copyShare()">Copy &amp; Share Result</button>
  <button class="act act-s" onclick="set({step:'input',result:null,portrait:null,photo:null,urls:['','','']})">Try Again</button>
</div>
<div class="copy-ok ${S.copied ? 'show' : ''}">✦ Copied to clipboard — ready to share!</div>
<div class="renovation">
  <div class="ren-eyebrow">✦ &nbsp; Your Revolutionary Soul, Today &nbsp; ✦</div>
  <p class="ren-body"><strong>${r.figureName}'s</strong> fire didn't die in ${(r.figureYears||'').split('–')[1]||'the 18th century'}. The same restless conviction that drove figures like yours is exactly what America needs again right now — and it lives in you. <em>The Renovation</em> is where that conversation happens.</p>
  <a class="ren-link" href="https://markdmills.substack.com/" target="_blank" rel="noopener">Read The Renovation →</a>
</div>
</div>`;

    const pi = document.getElementById('portImg');
    if (pi && !S.pLoaded) {
      pi.onload = () => { S.pLoaded = true; draw(); };
      pi.onerror = () => { pi.remove(); };
    }
  }
}

draw();
</script>
</body>
</html>
